spring:
  application:
    name: payments
  datasource:
    url: jdbc:h2:mem:payments_schema;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  from-number: ${TWILIO_FROM_NUMBER:+254714851234}

sms:
  retry-job:
    fixed-delay: 1800000

payment:
  gateway:
    connect-timeout: 5000
    read-timeout: 10000
    mpesa:
      base-url: https://sandbox.safaricom.co.ke
    card:
      base-url: https://api.stripe.com
